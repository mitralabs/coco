skip: false
llm_model: ["meta-llama/Llama-3.3-70B-Instruct", "openai"] # (model name, coco llm_api)
get_answers:
  mode: agent # agent or rag

  # caching options
  load_from_file: false
  load_file_name_ret: ${general.data_dir}/runs/test-gt-qa-2/generated_answers_ret.json
  load_file_name_gt: ${general.data_dir}/runs/test-gt-qa-2/generated_answers_gt.json
  output_file_name_ret: ${general.data_dir}/runs/${wandb.name}/generated_answers_ret.json
  output_file_name_gt: ${general.data_dir}/runs/${wandb.name}/generated_answers_gt.json
  output_file_name_agent: ${general.data_dir}/runs/${wandb.name}/agent_conversations.json

  # rag options
  rag_generate_answers_batch_size: 5
  rag_generate_answers_limit_parallel: 10
  rag_top_k: 5
  rag_prompt_template: null

  # agent options
  agent_generate_answers_batch_size: 5
  agent_generate_answers_limit_parallel: 10
  agent_max_iterations: 20
  agent_max_tool_calls: 20
  agent_system_prompt: |
    You are a helpful assistant. You are an expert in composing functions.

    You have access to a database with chunked transcripts of the users conversations. 
    You can query the database with tool calls. You can use multiple tools in a row or use one tool multiple times.
    
    This is an example tool call: 
    {"name": "semantic_query", "parameters": {"query_text": "Notgroschen aufbauen", "num_results": "5"}}

    The transcripts have speaker labels and a timestamp.
    This is an example chunk content: "Ich: Ich habe dieses großartige Buch über Produktivität gelesen, das mir sehr geholfen hat. /nMax: Welches Buch war das?"

    You embrace the users query as a challenge to find the correct answer in the database. You know that a search result from the database is not equivalent to a correct answer. 
    E.g. the answer is a summary of multiple database entries or a combination of them, but one tool call only retrieved a fraction of the information. 

    You think step by step. You answer concise, best in one sentence only and always in german (this is important), unless the user writes in a different language.
    The current day is 2025-03-19, and the time is 22:12.

ragas:
  skip: true
  openai_base_url: ${coco.openai_base}
  openai_llm_model: meta-llama/Llama-3.3-70B-Instruct
geval:
  skip: false
